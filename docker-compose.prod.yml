# Production-ready compose extending docker-compose.yml with application services.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Or set COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml

services:
  # One-shot migration runner — exits after migrations complete
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # API server
  # Note: deploy.replicas is a Docker Swarm feature. In standalone compose,
  # scale via: docker compose -f ... up --scale api=2
  # With multiple replicas, put a reverse proxy (nginx/traefik) in front.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - '3000:3000'
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure
    healthcheck:
      # Distroless runtime has no wget/shell — use the bundled node + global fetch (Node 22).
      test:
        [
          'CMD',
          '/nodejs/bin/node',
          '-e',
          "fetch('http://localhost:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Background workers
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure
