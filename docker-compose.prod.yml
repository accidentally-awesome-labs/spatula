# Production-ready compose extending docker-compose.yml with application services.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Or set COMPOSE_FILE in .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml

services:
  # One-shot migration runner — exits after migrations complete
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    env_file: .env
    # Override the .env localhost URLs: inside a container, the DB/Redis live at the
    # compose service names, not localhost. (env_file's .env keeps localhost so the
    # host-run tooling — e.g. the sizing harness — works unchanged.)
    environment:
      DATABASE_URL: postgresql://spatula:spatula@postgres:5432/spatula
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  # API server
  # Note: deploy.replicas is a Docker Swarm feature. In standalone compose,
  # scale via: docker compose -f ... up --scale api=2
  # With multiple replicas, put a reverse proxy (nginx/traefik) in front.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      # Host port overridable for local conflicts: SPATULA_API_PORT=3100 docker compose ... up
      - '${SPATULA_API_PORT:-3000}:3000'
    env_file: .env
    # See migrate: container-internal DB/Redis hosts (not localhost from .env).
    environment:
      DATABASE_URL: postgresql://spatula:spatula@postgres:5432/spatula
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure
    healthcheck:
      # Distroless runtime has no wget/shell — use the bundled node + global fetch (Node 22).
      test:
        [
          'CMD',
          '/nodejs/bin/node',
          '-e',
          "fetch('http://localhost:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Background workers
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    # See migrate: container-internal DB/Redis hosts (not localhost from .env).
    environment:
      DATABASE_URL: postgresql://spatula:spatula@postgres:5432/spatula
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: on-failure
