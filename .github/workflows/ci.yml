name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: # Allow release.yml to call this workflow

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    # The `Unit Tests` umbrella covers a couple of integration-grade tests
    # inside the @spatula/db package (user-tenant-repository.integration.test
    # and the connection-factory exports tests) that hit a real Postgres.
    # Wire Postgres + Redis services here so the umbrella stays green; a
    # follow-up phase can split unit vs integration into separate turbo
    # pipelines if we want stricter hermetic-test discipline.
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: spatula
          POSTGRES_PASSWORD: spatula
          POSTGRES_DB: spatula_test
        options: >-
          --health-cmd "pg_isready -U spatula"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
      TEST_DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @spatula/db... build
      - name: Apply migrations to test DB
        run: pnpm --filter @spatula/db run db:migrate
      - run: pnpm run test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: spatula
          POSTGRES_PASSWORD: spatula
          POSTGRES_DB: spatula_test
        options: >-
          --health-cmd "pg_isready -U spatula"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
      DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
      REDIS_URL: redis://localhost:6379
      OPENROUTER_API_KEY: test-key-not-real
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Run migrations
        run: pnpm --filter @spatula/db db:migrate
      - run: pnpm run test:e2e

  test-carveout:
    name: Forward Carve-out Tests
    runs-on: ubuntu-latest
    # Keeps the public OSS API free of billing and payment-provider surface area.
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: spatula
          POSTGRES_PASSWORD: spatula
          POSTGRES_DB: spatula_test
        options: >-
          --health-cmd "pg_isready -U spatula"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
      DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Build workspace (forward tests import from apps/api source)
        run: pnpm run build
      - name: Apply v1 baseline migration to test DB
        run: pnpm --filter @spatula/db exec tsx src/run-migrate.ts
      - name: Forward carve-out tests
        run: pnpm run test:carveout

  test-contract:
    name: Public Contract Tests
    runs-on: ubuntu-latest
    # Boots the API, fetches the live /api/v1/openapi.json, and validates the
    # public REST contract plus docs guardrails on every PR.
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: spatula
          POSTGRES_PASSWORD: spatula
          POSTGRES_DB: spatula_test
        options: >-
          --health-cmd "pg_isready -U spatula"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
      DATABASE_URL: postgresql://spatula:spatula@localhost:5432/spatula_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Build workspace (contract suite boots the live apps/api app)
        run: pnpm run build
      - name: Apply v1 baseline migration to test DB
        run: pnpm --filter @spatula/db exec tsx src/run-migrate.ts
      - name: Public contract tests
        run: pnpm run test:contract

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
