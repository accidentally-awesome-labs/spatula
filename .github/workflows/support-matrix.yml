# Support Matrix — Min-Version CI
#
# Heavy DB lanes (backup/upgrade) run on release tags, nightly, and manually.
# The light config-compat lane (pnpm test:config) is pure in-process and can be
# moved into the PR gate if we decide the extra runtime is worth it.
#
# Not triggered on pull_request: DB-heavy lanes would burden the PR gate.

name: Support Matrix

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 2 * * *' # nightly at 02:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: support-matrix-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  min-version:
    name: Min-version (${{ matrix.postgres }}) Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        postgres: ['14', '15', '16']
        node: ['22']
        redis: ['7']

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spatula_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:${{ matrix.redis }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spatula_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spatula_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Apply migrations to test DB
        run: pnpm --filter @accidentally-awesome-labs/spatula-db run db:migrate

      - name: Run heavy test lanes (config-compat + upgrade + backup)
        run: |
          pnpm test:config
          pnpm test:upgrade
          pnpm test:backup
