# Support Matrix — Min-Version CI
#
# Heavy DB lanes (backup/upgrade) run on-release + nightly (Phase 19 CONTEXT
# Claude's-discretion cadence). The light config-compat lane (pnpm test:config)
# is pure in-process (no DB) and is safe to add to ci.yml on PR if desired —
# that wiring is left to Phase 21 (full CI topology).
#
# NOT triggered on pull_request: DB-heavy lanes would burden the PR gate.

name: Support Matrix

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 2 * * *'     # nightly at 02:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  min-version:
    name: Min-version (${{ matrix.postgres }}) Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        postgres: ['14', '15', '16']
        node: ['22']
        redis: ['7']

    services:
      postgres:
        image: postgres:${{ matrix.postgres }}-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: spatula_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:${{ matrix.redis }}-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spatula_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/spatula_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Apply migrations to test DB
        run: pnpm --filter @spatula/db run db:migrate

      - name: Run heavy test lanes (config-compat + upgrade + backup)
        run: |
          pnpm test:config
          pnpm test:upgrade
          pnpm test:backup
