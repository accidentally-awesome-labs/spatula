name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci
    # id-token:write must be at job level, not workflow level, for keyless
    # cosign OIDC to work.
    permissions:
      contents: write # softprops/action-gh-release uploads SBOM assets
      packages: write # push images to GHCR
      id-token: write # REQUIRED for keyless cosign OIDC → Fulcio → Rekor
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: Dockerfile.api
          - image: worker
            dockerfile: Dockerfile.worker
          - image: cli
            dockerfile: Dockerfile.cli
          - image: migrate
            dockerfile: Dockerfile.migrate
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4 # required for arm64 cross-compilation on ubuntu-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # NOTE: arm64 better-sqlite3 recompilation under QEMU emulation is correct
      # but slow (~15–25 min). Per-image cache scoping (scope=${{ matrix.image }})
      # prevents cache-eviction races across the four parallel matrix builds.
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      # Sign by immutable digest, not by tag, to avoid tag-retargeting races.
      # steps.build.outputs.digest is set by build-push-action after push.
      - name: Sign image (keyless cosign)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}

      - name: Generate SBOM (cyclonedx-json)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.image }}.cdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --type cyclonedx \
            --predicate sbom-${{ matrix.image }}.cdx.json \
            ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}

      - name: Upload SBOM as release asset
        uses: softprops/action-gh-release@v3
        with:
          files: sbom-${{ matrix.image }}.cdx.json

  publish-npm:
    name: Publish npm Packages (Trusted Publishing)
    runs-on: ubuntu-latest
    needs: ci
    # id-token:write must live at job level. Provenance attestation requires
    # OIDC tokens scoped to this job only.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest (>= 11.5.1 required for trusted publishing)
        run: npm install -g npm@latest

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      # Each pnpm publish uses --provenance to attest the package was built
      # in this exact workflow run; --access public is required for scoped
      # packages on their first publish. No long-lived publish token is used:
      # npm >= 11.5.1 + id-token:write at job level enables trusted publishing
      # via GitHub OIDC. Configure each package's trusted publisher in the
      # npm web UI BEFORE the first publish (Organization:
      # accidentally-awesome-labs; Repository: spatula; Workflow: release.yml).

      - name: Publish @spatula/core-types
        run: pnpm --filter @spatula/core-types publish --provenance --access public --no-git-checks

      - name: Publish @spatula/client
        run: pnpm --filter @spatula/client publish --provenance --access public --no-git-checks

      - name: Publish @spatula/shared
        run: pnpm --filter @spatula/shared publish --provenance --access public --no-git-checks

      - name: Publish @spatula/core
        run: pnpm --filter @spatula/core publish --provenance --access public --no-git-checks

      - name: Publish @spatula/db
        run: pnpm --filter @spatula/db publish --provenance --access public --no-git-checks

      - name: Publish @spatula/queue
        run: pnpm --filter @spatula/queue publish --provenance --access public --no-git-checks

      - name: Publish @spatula/api
        run: pnpm --filter @spatula/api publish --provenance --access public --no-git-checks

      - name: Publish @spatula/cli
        run: pnpm --filter @spatula/cli publish --provenance --access public --no-git-checks

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci, docker, publish-npm]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Docker Images

            ```
            docker pull ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/worker:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/migrate:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/cli:${{ steps.version.outputs.version }}
            ```

            All images are multi-arch (linux/amd64 + linux/arm64), cosign-signed (keyless, Rekor transparent log). SBOMs (cyclonedx-json) are attached as release assets and attested to each image. Verify per [docs/runbooks/verify-images.md](https://github.com/${{ github.repository }}/blob/main/docs/runbooks/verify-images.md).

            ## npm Packages

            Published with `--provenance` (GitHub OIDC trusted publishing) and `--access public`:

            ```
            npm install @spatula/client@${{ steps.version.outputs.version }}
            npm install @spatula/core-types@${{ steps.version.outputs.version }}
            npm install -g @spatula/cli@${{ steps.version.outputs.version }}
            ```
