name: Release

on:
  push:
    tags:
      # release-please prefixes monorepo tags with the component name. Only
      # the root tag should publish the lockstep npm package set; the sibling
      # component tags would otherwise start the same release repeatedly.
      - 'spatula-v*'

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: ci
    # id-token:write must be at job level, not workflow level, for keyless
    # cosign OIDC to work.
    permissions:
      contents: write # softprops/action-gh-release uploads SBOM assets
      packages: write # push images to GHCR
      id-token: write # REQUIRED for keyless cosign OIDC → Fulcio → Rekor
    strategy:
      matrix:
        include:
          - image: api
            dockerfile: Dockerfile.api
          - image: worker
            dockerfile: Dockerfile.worker
          - image: cli
            dockerfile: Dockerfile.cli
          - image: migrate
            dockerfile: Dockerfile.migrate
    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4 # required for arm64 cross-compilation on ubuntu-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#spatula-v}" >> $GITHUB_OUTPUT

      # NOTE: arm64 better-sqlite3 recompilation under QEMU emulation is correct
      # but slow (~15–25 min). Per-image cache scoping (scope=${{ matrix.image }})
      # prevents cache-eviction races across the four parallel matrix builds.
      - name: Build and push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      # Sign by immutable digest, not by tag, to avoid tag-retargeting races.
      # steps.build.outputs.digest is set by build-push-action after push.
      - name: Sign image (keyless cosign)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}

      - name: Generate SBOM (cyclonedx-json)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.image }}.cdx.json

      - name: Attest SBOM to image
        run: |
          cosign attest --yes \
            --type cyclonedx \
            --predicate sbom-${{ matrix.image }}.cdx.json \
            ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}

      - name: Upload SBOM as release asset
        uses: softprops/action-gh-release@v3
        with:
          files: sbom-${{ matrix.image }}.cdx.json

  publish-npm:
    name: Publish npm Packages
    runs-on: ubuntu-latest
    needs: ci
    # id-token:write must live at job level. Provenance attestation requires
    # OIDC tokens scoped to this job only.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to latest (>= 11.5.1 required for trusted publishing)
        run: npm install -g npm@latest

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Extract and validate lockstep version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#spatula-v}" >> "$GITHUB_OUTPUT"
          node scripts/check-release-version.mjs "$GITHUB_REF_NAME"

      # pnpm creates workspace-aware tarballs (rewriting workspace: ranges),
      # then npm publishes those exact artifacts through its documented OIDC
      # path. npm >= 11.5.1 + id-token:write enables trusted publishing for
      # every package without a stored registry credential.

      - name: Publish packages in dependency order
        run: |
          pack_dir="$RUNNER_TEMP/spatula-npm-packs"
          mkdir -p "$pack_dir"
          packages=(
            @accidentally-awesome-labs/spatula-core-types
            @accidentally-awesome-labs/spatula-client
            @accidentally-awesome-labs/spatula-shared
            @accidentally-awesome-labs/spatula-core
            @accidentally-awesome-labs/spatula-db
            @accidentally-awesome-labs/spatula-queue
            @accidentally-awesome-labs/spatula-api
            @accidentally-awesome-labs/spatula
          )
          for package in "${packages[@]}"; do
            if npm view "${package}@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
              echo "${package}@${{ steps.version.outputs.version }} already published"
            else
              pnpm --filter "$package" pack --pack-destination "$pack_dir"
              slug="${package#@}"
              slug="${slug//\//-}"
              tarball="$pack_dir/${slug}-${{ steps.version.outputs.version }}.tgz"
              test -f "$tarball"
              npm publish "$tarball" --provenance --access public
            fi
          done

  verify-npm:
    name: Verify npm install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: publish-npm
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#spatula-v}" >> "$GITHUB_OUTPUT"
      - name: Wait for registry propagation and install
        shell: bash
        run: |
          for attempt in {1..20}; do
            if npm view "@accidentally-awesome-labs/spatula@${{ steps.version.outputs.version }}" version \
              --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              break
            fi
            if [ "$attempt" = 20 ]; then
              echo "Package did not appear in npm after 10 minutes" >&2
              exit 1
            fi
            sleep 30
          done
          npm install --global "@accidentally-awesome-labs/spatula@${{ steps.version.outputs.version }}" \
            --registry=https://registry.npmjs.org \
            --allow-scripts=better-sqlite3
      - name: Smoke installed CLI
        shell: bash
        env:
          SPATULA_HOME: ${{ runner.temp }}/spatula-home
        run: |
          test "$(spatula --version)" = "${{ steps.version.outputs.version }}"
          spatula --help >/dev/null
          mkdir -p "${{ runner.temp }}/spatula-project"
          cd "${{ runner.temp }}/spatula-project"
          spatula init https://example.com
          test -f spatula.yaml

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [ci, docker, verify-npm]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#spatula-v}" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          append_body: true
          body: |
            ## Docker Images

            ```
            docker pull ghcr.io/${{ github.repository }}/api:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/worker:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/migrate:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}/cli:${{ steps.version.outputs.version }}
            ```

            All images are multi-arch (linux/amd64 + linux/arm64), cosign-signed (keyless, Rekor transparent log). SBOMs (cyclonedx-json) are attached as release assets and attested to each image. Verify per [docs/runbooks/verify-images.md](https://github.com/${{ github.repository }}/blob/main/docs/runbooks/verify-images.md).

            ## npm Packages

            Published with provenance and `--access public`. Ongoing releases use GitHub OIDC trusted publishing:

            ```
            npm install @accidentally-awesome-labs/spatula-client@${{ steps.version.outputs.version }}
            npm install @accidentally-awesome-labs/spatula-core-types@${{ steps.version.outputs.version }}
            npm install -g @accidentally-awesome-labs/spatula@${{ steps.version.outputs.version }} --allow-scripts=better-sqlite3
            ```
