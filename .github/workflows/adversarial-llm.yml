# Adversarial LLM test suite
#
# Coverage policy:
#   - Runs on PRs touching packages/core/src/extraction/** and on a daily
#     cron at 06:00 UTC. It does not run on every push.
#   - The OpenRouter-pinned suite runs on GitHub-hosted runners when the
#     OPENROUTER_API_KEY repository secret is available.
#   - The Ollama-pinned suite runs only via workflow_dispatch on self-hosted
#     runners so hosted CI never attempts to pull or serve the local model.
#   - A failed cron run marks the workflow red only; this workflow does not
#     auto-open issues or send notifications.
#
# Fork PR secret safety: the path trigger fires on fork PRs but
# secrets.OPENROUTER_API_KEY is empty for fork workflows. The step guard
#   if: env.OPENROUTER_API_KEY != ''
# ensures the live test step is skipped cleanly on fork PRs - tests use
# it.skipIf(!LIVE) so the suite exits 0 with all tests marked as skipped.

name: Adversarial LLM Tests

on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    branches: [main]
    paths:
      - 'packages/core/src/extraction/**'
      - 'packages/core/src/extraction/__tests__/pinned-models.ts'
  workflow_dispatch:

jobs:
  adversarial-openrouter:
    name: Adversarial (OpenRouter pin)
    runs-on: ubuntu-latest
    env:
      SPATULA_LIVE_LLM: '1'
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run adversarial suite (OpenRouter pin)
        if: ${{ env.OPENROUTER_API_KEY != '' }}
        run: pnpm --filter @spatula/core run test:adversarial

  adversarial-ollama:
    name: Adversarial (Ollama pin)
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    env:
      SPATULA_LIVE_LLM: '1'
      OLLAMA_BASE_URL: http://localhost:11434
      SPATULA_ADVERSARIAL_MODEL: ollama
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run adversarial suite (Ollama pin)
        run: pnpm --filter @spatula/core run test:adversarial
