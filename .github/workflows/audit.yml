name: Security Audit

on:
  schedule:
    - cron: '0 9 * * *' # Daily at 9am UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  osv-scan:
    name: OSV Vulnerability Scan
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
    with:
      scan-args: '--lockfile pnpm-lock.yaml'

  license-check:
    name: License Allowlist Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check license allowlist
        run: |
          pnpm exec license-checker-rseidelsohn \
            --excludePrivatePackages \
            --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;BlueOak-1.0.0;CC0-1.0;Python-2.0;Unlicense;MPL-2.0"

  secret-scan:
    name: Secret Scan (gitleaks + trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Full history required for trufflehog
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --config=/repo/.gitleaks.toml --redact --verbose
      - uses: trufflesecurity/trufflehog@v3.95.9
        with:
          path: ./
          base: ''
          head: HEAD
          version: 3.95.9
          extra_args: --results=verified
