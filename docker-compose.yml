services:
  postgres:
    image: postgres:16-alpine
    ports:
      # Host port overridable for local collisions: SPATULA_PG_PORT=5433 docker compose up
      - '${SPATULA_PG_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: spatula
      POSTGRES_PASSWORD: spatula
      POSTGRES_DB: spatula
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spatula']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Host port overridable for local collisions: SPATULA_REDIS_PORT=6380 docker compose up
      - '${SPATULA_REDIS_PORT:-6379}:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
