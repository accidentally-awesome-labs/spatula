apiVersion: batch/v1
kind: Job
metadata:
  name: spatula-migrate
  namespace: spatula
  annotations:
    # To re-run migrations on upgrade:
    #   kubectl delete job spatula-migrate -n spatula
    #   kubectl apply -k deploy/k8s/overlays/<env>
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      # No initContainer: the migrate container handles connection retries via
      # Drizzle's connect-on-use behavior + backoffLimit: 3 (k8s re-runs the
      # pod on non-zero exit). In the dev overlay, the postgres-stub readinessProbe
      # ensures the DB is up before most traffic routes to it; the startupProbe
      # on api/worker gives migrate additional head-start time before readiness traffic.
      # This keeps the base manifest free of dev database stubs for production use.
      containers:
        - name: migrate
          # Image tag is overridden by overlays.
          image: ghcr.io/accidentally-awesome-labs/spatula/migrate:latest
          envFrom:
            - secretRef:
                name: spatula-secrets
          # One-shot: exits 0 after migrations complete (see Dockerfile.migrate CMD).
          # backoffLimit: 3 retries on transient failures (connection refused, etc.).
