# Example only. Do not add this file to base/kustomization.yaml.
#
# Production operators should create a real Secret named `spatula-secrets`
# with kubectl, External Secrets Operator, Sealed Secrets, or their platform's
# secret manager before applying the prod overlay.
apiVersion: v1
kind: Secret
metadata:
  name: spatula-secrets
  namespace: spatula
stringData:
  DATABASE_URL: 'postgresql://user:pass@host:5432/spatula'
  REDIS_URL: 'redis://host:6379'
  OPENROUTER_API_KEY: 'sk-or-...'
  AUTH_STRATEGY: 'api-key'
  TENANT_CREATION_SECRET: 'replace-with-random-secret'
