# ─── Spatula Secrets — PLACEHOLDER VALUES ────────────────────────────────────
#
# ⚠️  SECURITY: These values are PLACEHOLDERS. Replace them before deploying
#    to any environment beyond local kind dev.
#
# How to supply real secrets (choose one upgrade path):
#
#   Option A — kubectl create secret (simplest, manual):
#     kubectl create secret generic spatula-secrets -n spatula \
#       --from-literal=DATABASE_URL="postgresql://user:pass@host:5432/spatula" \
#       --from-literal=REDIS_URL="redis://host:6379" \
#       --from-literal=OPENROUTER_API_KEY="sk-or-..." \
#       --save-config --dry-run=client -o yaml | kubectl apply -f -
#
#   Option B — External Secrets Operator (ESO, recommended for production):
#     https://external-secrets.io — syncs secrets from AWS Secrets Manager,
#     GCP Secret Manager, HashiCorp Vault, Azure Key Vault, etc.
#     Replace this manifest with an ExternalSecret + SecretStore pair.
#
#   Option C — Sealed Secrets (GitOps-friendly, encrypted at rest in git):
#     https://sealed-secrets.netlify.app — encrypt with kubeseal, commit
#     the SealedSecret, controller decrypts in-cluster.
#     Replace this manifest with a SealedSecret.
#
# Dev overlay note: The base Secret's DATABASE_URL / REDIS_URL already point
# at the in-cluster postgres / redis stub Services (postgres:5432, redis:6379).
# For dev on kind, no Secret override is needed — apply as-is.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: spatula-secrets
  namespace: spatula
stringData:
  # ⚠️ PLACEHOLDERS — dev defaults work on kind with the dev overlay stubs.
  # MUST be overridden for any real deployment.
  DATABASE_URL: "postgresql://spatula:spatula@postgres:5432/spatula"   # dev default; OVERRIDE in prod
  REDIS_URL: "redis://redis:6379"                                        # dev default; OVERRIDE in prod
  OPENROUTER_API_KEY: "REPLACE_ME"

  # Optional — uncomment and set for production:
  # FIRECRAWL_API_KEY: "REPLACE_ME"
  # AUTH_STRATEGY: "api-key"          # or "jwt"
  # JWT_ISSUER: "REPLACE_ME"
  # JWT_AUDIENCE: "REPLACE_ME"
  # JWT_JWKS_URL: "REPLACE_ME"
  # CONTENT_STORE: "s3"
  # S3_BUCKET: "REPLACE_ME"
  # S3_REGION: "us-east-1"
  # S3_ENDPOINT: "REPLACE_ME"
  # S3_ACCESS_KEY_ID: "REPLACE_ME"
  # S3_SECRET_ACCESS_KEY: "REPLACE_ME"
  # SENTRY_DSN: "REPLACE_ME"
  # OTEL_EXPORTER_ENDPOINT: "REPLACE_ME"
  # TENANT_CREATION_SECRET: "REPLACE_ME"
