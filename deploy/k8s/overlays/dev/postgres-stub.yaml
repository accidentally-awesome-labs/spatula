# Throwaway in-cluster Postgres for dev/kind environments (D-09).
# No PVC — data is ephemeral (emptyDir). Wipe the cluster to reset.
# Do NOT use in production — use a managed Postgres service instead.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: spatula
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: spatula
            - name: POSTGRES_PASSWORD
              value: spatula
            - name: POSTGRES_DB
              value: spatula
          # emptyDir = throwaway storage (dev-only, no PVC needed)
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: [pg_isready, -U, spatula]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: pgdata
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: spatula
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
