apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Dev overlay (D-09): self-contained on a fresh kind cluster.
# Adds throwaway in-cluster Postgres + Redis stub pods — no external services needed.
#
# Secret note: dev generates a local-only spatula-secrets Secret that points at
# the in-cluster postgres / redis Services (postgres:5432, redis:6379).

namespace: spatula

resources:
  - ../../base
  - postgres-stub.yaml
  - redis-stub.yaml

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: spatula-secrets
    literals:
      - DATABASE_URL=postgresql://spatula:spatula@postgres:5432/spatula
      - REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=REPLACE_ME
      - AUTH_STRATEGY=none

# Override image tags to :latest for dev (CI will pull the most recent build).
# For a specific dev build, change the newTag below.
images:
  - name: ghcr.io/accidentally-awesome-labs/spatula/api
    newTag: latest
  - name: ghcr.io/accidentally-awesome-labs/spatula/worker
    newTag: latest
  - name: ghcr.io/accidentally-awesome-labs/spatula/migrate
    newTag: latest
