# nginx.conf — Spatula reverse-proxy configuration
#
# Tested: nginx 1.25+ (reverse-proxy, SSE/WebSocket, token-in-URL log masking)
# Validate with: nginx -t -c /path/to/this/nginx.conf
#                (requires nginx to be installed — not validated automatically in CI)
# Place this file at /etc/nginx/nginx.conf or include it from your site config.
#
# See docs/runbooks/reverse-proxy.md for the full setup guide.

# ──────────────────────────────────────────────────────────────────
# TOKEN-IN-URL ACCESS-LOG MASKING
#
# The Spatula API serves SSE and WebSocket streams with a short-lived
# ?token= query parameter (e.g. GET /api/v1/jobs/:id/events?token=<secret>).
# Left unmasked, nginx access logs would permanently record token values,
# creating a secret-in-logs vulnerability.
#
# Masking approach: use $uri (path only, no query string) in the access-log
# format instead of $request. This prevents the query string — including
# ?token= values — from ever appearing in access logs.
# The upstream request URI (with the full query string) is still passed to
# the API via proxy_pass; only the logged value is masked.
# ──────────────────────────────────────────────────────────────────

# Required for SSE/WebSocket upgrade handling
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ──────────────────────────────────────────────────────────────────
# CUSTOM LOG FORMAT — token-masked
#
# Uses $uri (no query string) instead of $request to prevent
# ?token=<secret> from appearing in access logs.
# ──────────────────────────────────────────────────────────────────
log_format spatula_masked
    '$remote_addr - $remote_user [$time_local] '
    '"$request_method $uri $server_protocol" '
    '$status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" '
    'rt=$request_time';
    # NOTE: $uri logs the path only (no query string).
    # The ?token= parameter is intentionally omitted from access logs.

# ──────────────────────────────────────────────────────────────────
# UPSTREAM
# ──────────────────────────────────────────────────────────────────
upstream spatula_api {
    server 127.0.0.1:3000;
    # For multiple API instances behind nginx, add additional server lines:
    # server 127.0.0.1:3001;
    # server 127.0.0.1:3002;
    keepalive 32;
}

# ──────────────────────────────────────────────────────────────────
# MAIN SERVER BLOCK
# ──────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;   # replace with your domain (e.g. api.spatula.example.com)

    # Use the token-masked log format for all requests on this server
    access_log /var/log/nginx/spatula_access.log spatula_masked;

    # ── General proxy settings ────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;

    # ── Health endpoint (no auth required) ───────────────────────
    location /health {
        proxy_pass http://spatula_api;
    }

    # ── SSE job events — streaming, no buffering ──────────────────
    # Path: GET /api/v1/jobs/:id/events?token=<short-lived-token>
    # The ?token= query param is passed upstream but NOT logged (see log_format above).
    location ~ ^/api/v1/jobs/[^/]+/events$ {
        proxy_pass http://spatula_api;

        # SSE requires HTTP/1.1 and no buffering
        proxy_http_version 1.1;
        proxy_set_header Connection '';   # keep-alive for SSE
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;         # hold SSE connections open for up to 1 hour
        proxy_send_timeout 3600s;

        # Pass the token query param through to the API unchanged
        # (it is authenticated by the API, not nginx)
    }

    # ── WebSocket upgrade ─────────────────────────────────────────
    # Path: /ws/ (WebSocket endpoints, also token-auth'd via ?token=)
    location /ws/ {
        proxy_pass http://spatula_api;

        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── All other API routes ──────────────────────────────────────
    location / {
        proxy_pass http://spatula_api;

        # Standard timeouts for REST requests
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer settings for normal REST responses
        proxy_buffering on;
        proxy_buffer_size   16k;
        proxy_buffers       8 32k;
    }
}

