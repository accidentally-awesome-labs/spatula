# config/rate-limits.yaml
#
# Per-route rate-limit configuration for the Spatula REST API. Loaded once at
# boot by `apps/api/src/middleware/rate-limit-config.ts`. Override the entire
# file via the `SPATULA_RATE_LIMITS_PATH` env var (file is fully replaced — no
# field merging).
#
# Frozen at v1: the SHAPE (`default` + `routeGroups`) cannot change in 1.x;
# the VALUES (rpm, maxConcurrentJobs) are operator-tunable.
#
# Lookup semantics (v1):
#   - Key format: `METHOD /api/v1/...` (e.g., `GET /api/v1/health`).
#   - Exact-match only — no glob/wildcard matching.
#   - Unmatched routes fall back to `default`.
#
# Reload semantics (v1): boot-only. Changing this file requires a process
# restart. Hot-reload deferred to a future plan.

default:
  requestsPerMinute: 300
  maxConcurrentJobs: 10

routeGroups:
  # Health probe — high frequency, low cost
  "GET /api/v1/health":
    requestsPerMinute: 6000

  # Job creation — write-heavy, throttle to protect downstream queues
  "POST /api/v1/jobs":
    requestsPerMinute: 30
    maxConcurrentJobs: 5

  # Entity listing — read path; relax versus default
  "GET /api/v1/entities":
    requestsPerMinute: 600

  # Admin tenant management — privileged write paths, throttle harder
  "POST /api/v1/admin/tenants":
    requestsPerMinute: 60
  "DELETE /api/v1/admin/tenants/{id}":
    requestsPerMinute: 30
